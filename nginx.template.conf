worker_processes 5;
daemon off;

worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
}

http {
    include $!{nginx}/conf/mime.types;
    index index.html index.htm index.php;

    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local]  $status '
        '"$request" $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout;
    error_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    server_names_hash_bucket_size 128;

    server {
        listen ${PORT};
        listen [::]:${PORT};
        server_name localhost;

        root /app;
        index index.php;
        charset utf-8;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }
        location = /GESTION { return 301 /gestion/; }
        location = /GESTION/ { return 301 /gestion/; }
        location = /gestion { return 301 /gestion/; }

        # Equivalent routes for the legacy Apache .htaccess rules.
        rewrite ^/index/?$ /index.php last;
        rewrite ^/conocenos/?$ /conocenos.php last;
        rewrite ^/programas/?$ /programas.php last;
        rewrite ^/programa-inicial/?$ /programa-inicial.php last;
        rewrite ^/programa-pro/?$ /programa-pro.php last;
        rewrite ^/test/?$ /test.php last;
        rewrite ^/ranking/?$ /ranking.php last;
        rewrite ^/blog/?$ /blog.php last;
        rewrite ^/contacto/?$ /contacto.php last;
        rewrite ^/a-leer-bolivia/?$ /a-leer-bolivia.php last;
        rewrite ^/terminos-condiciones/?$ /terminos-condiciones.php last;

        rewrite ^/blog-detalle-([a-z0-9-]+)/?$ /blog-detalle.php?blog=$1 last;
        rewrite ^/blog-categoria-([a-z0-9-]+)/?$ /blog.php?categoria=$1 last;
        rewrite ^/blog-tag-([a-z0-9-]+)/?$ /blog.php?etiqueta=$1 last;
        rewrite ^/blog-buscar-([a-z0-9-]+)/?$ /blog.php?q=$1 last;

        rewrite ^/material-tipo-([a-z0-9-]+)/?$ /materiales.php?tipo=$1 last;
        rewrite ^/material-categoria-([a-z0-9-]+)/?$ /materiales.php?categoria=$1 last;
        rewrite ^/material-([a-z0-9-]+)/?$ /materiales-detalle.php?material=$1 last;

        rewrite ^/contrasena-generar-([a-z0-9-]+)/?$ /contrasena-generar.php?id=$1 last;

        rewrite ^/api/lectura/([a-zA-Z]+)(/.*)?$ /api/lectura/index.php?action=$1&$args last;
        rewrite ^/api/razonamiento/([a-zA-Z]+)(/.*)?$ /api/razonamiento/index.php?action=$1&$args last;
        rewrite ^/api/iq/([a-zA-Z]+)(/.*)?$ /api/iq/index.php?action=$1&$args last;
        rewrite ^/api/contacto/([a-zA-Z]+)(/.*)?$ /api/contacto/index.php?action=$1&$args last;
        rewrite ^/api/cerebral/([a-zA-Z]+)(/.*)?$ /api/cerebral/index.php?action=$1&$args last;
        rewrite ^/api/push-notification/([a-zA-Z]+)(/.*)?$ /api/push-notification/index.php?action=$1&$args last;

        rewrite ^/test-([a-z]+)-([a-z]+)/?$ /test.php?tipo=$1&categoria=$2 last;
        rewrite ^/test-([a-z]+)/?$ /test.php?tipo=$1 last;

        rewrite ^/include/ajax/?$ /include/ajax.php last;
        rewrite ^/include/lectura-test/?$ /include/lectura-test.php last;
        rewrite ^/include/razonamiento-test/?$ /include/razonamiento-test.php last;

        rewrite ^/gestion/ajax/?$ /gestion/ajax.php last;
        rewrite ^/gestion/main/?$ /gestion/main.php last;
        rewrite ^/gestion/index/?$ /gestion/index.php last;
        rewrite ^/gestion/salir/?$ /gestion/salir.php last;
        rewrite ^/gestion/page-(.*)-(.*)-pagina-([0-9]*)$ /gestion/main.php?page=$1&cod=$2&pagina=$3 last;
        rewrite ^/gestion/page-(.*)-pagina-([0-9]*)$ /gestion/main.php?page=$1&pagina=$2 last;
        rewrite ^/gestion/page-(.*)-([0-9_]*)$ /gestion/main.php?page=$1&cod=$2 last;
        rewrite ^/gestion/page-(.*)$ /gestion/main.php?page=$1 last;
        rewrite ^/gestion/report-(.*)$ /gestion/reports/downloadReport.php?report=$1&$args last;

        location / {
            try_files $uri $uri/ $uri.php?$query_string =404;
        }

        location ~* ^/uploads/.*\.(php|phtml|phar|php[0-9])$ {
            deny all;
        }

        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include $!{nginx}/conf/fastcgi_params;
            include $!{nginx}/conf/fastcgi.conf;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
